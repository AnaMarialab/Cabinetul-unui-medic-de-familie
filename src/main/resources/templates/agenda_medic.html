<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda Medic</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background: #34495e; color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #ddd; padding: 12px; }

        tr:hover { background-color: #f1f2f6; cursor: pointer; }

        .back-btn { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; margin-bottom: 20px; }
        .hint { color: #7f8c8d; font-style: italic; margin-bottom: 10px; }
    </style>
</head>
<body>
<a href="/medic/dashboard" class="back-btn">← Înapoi la Dashboard</a>
<h2>📅 Agenda Programărilor Confirmate</h2>
<p class="hint">Dublu click pe o programare pentru a finaliza consultația (Diagnostic & Tratament).</p>

<table>
    <thead>
    <tr>
        <th>Data</th>
        <th>Ora</th>
        <th>Pacient</th>
        <th>CNP</th>
        <th>Motiv</th>
        <th>Acțiune</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${agenda}"
        th:ondblclick="'window.location.href=\'/medic/consultatie/finalizare/' + ${p.ProgramareID} + '\''"
        title="Dublu click pentru a finaliza consultația">

        <td th:text="${p.DataProgramata}" style="font-weight: bold; color: #2980b9;"></td>
        <td th:text="${p.OraProgramata}" style="font-weight: bold;"></td>
        <td th:text="${p.Nume} + ' ' + ${p.Prenume}"></td>
        <td th:text="${p.CNP}"></td>
        <td th:text="${p.Motiv}"></td>
        <td>
            <a th:href="@{'/medic/consultatie/finalizare/' + ${p.ProgramareID}}"
               style="background: #27ae60; color: white; padding: 5px 10px; text-decoration: none; border-radius: 3px; font-size: 12px;">
                Finalizează
            </a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
