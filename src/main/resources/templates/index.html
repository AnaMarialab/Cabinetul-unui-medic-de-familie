<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cabinet Medical</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light" style="padding-top: 50px;">

<div class="container">
    <h2 class="text-center mb-4">Căutare Pacienți</h2>

    <div class="row justify-content-center mb-4">
        <div class="col-md-8">
            <form action="/cauta" method="get" class="d-flex gap-2">
                <input type="text" name="termenCautare" class="form-control"
                       placeholder="Introdu Nume sau Nume Prenume..."
                       th:value="${termenCautare}">
                <button type="submit" class="btn btn-primary">Caută</button>
            </form>
        </div>
    </div>

    <div th:if="${pacienti != null and !pacienti.isEmpty()}">
        <table class="table table-bordered table-striped bg-white">
            <thead class="table-dark">
            <tr>
                <th>Nume Complet</th>
                <th>CNP</th>
                <th>Adresă</th>
                <th>Asigurare</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${pacienti}">
                <td th:text="${p.nume + ' ' + p.prenume}"></td>
                <td th:text="${p.cnp}"></td>
                <td th:text="${p.orasDomiciliu + ', ' + p.strada}"></td>
                <td th:text="${p.casaDeAsigurari}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${pacienti != null and pacienti.isEmpty() and termenCautare != null}" class="alert alert-warning text-center">
        Nu am găsit pacienți pentru căutarea: <strong th:text="${termenCautare}"></strong>
    </div>
</div>

</body>
</html>
